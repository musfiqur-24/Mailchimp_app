<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mailchimp App service status" />
    <title>Mailchimp App</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0b1020;
        color: #eef2ff;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 15% 15%, rgba(124, 58, 237, 0.32), transparent 32rem),
          radial-gradient(circle at 85% 85%, rgba(14, 165, 233, 0.25), transparent 30rem),
          #0b1020;
      }

      main {
        width: min(90vw, 680px);
        padding: 3.25rem;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.7);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(16px);
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.55rem;
        margin: 0 0 1.25rem;
        color: #a5b4fc;
        font-size: 0.86rem;
        font-weight: 700;
        letter-spacing: 0.11em;
        text-transform: uppercase;
      }

      .status-dot {
        width: 0.6rem;
        height: 0.6rem;
        border-radius: 50%;
        background: #34d399;
        box-shadow: 0 0 0 5px rgba(52, 211, 153, 0.14);
      }

      h1 {
        max-width: 12ch;
        margin: 0;
        font-size: clamp(2.3rem, 7vw, 4.5rem);
        line-height: 1.02;
        letter-spacing: -0.06em;
      }

      p {
        max-width: 52ch;
        margin: 1.5rem 0 0;
        color: #cbd5e1;
        font-size: 1.08rem;
        line-height: 1.65;
      }

      .details {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
        margin-top: 2.5rem;
      }

      .detail {
        padding: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.045);
      }

      .detail span {
        display: block;
        color: #94a3b8;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .detail strong { display: block; margin-top: 0.35rem; font-size: 1rem; }

      @media (max-width: 520px) {
        main { padding: 2rem; }
        .details { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow"><span class="status-dot" aria-hidden="true"></span> Service online</div>
      <h1>Mailchimp App is live.</h1>
      <p>
        The secure integration service is ready to connect HubSpot workflows with Mailchimp.
        Email delivery will be enabled in a future release.
      </p>
      <section class="details" aria-label="Service details">
        <div class="detail"><span>Platform</span><strong>HubSpot + Mailchimp</strong></div>
        <div class="detail"><span>Environment</span><strong>Production</strong></div>
      </section>
    </main>
  </body>
</html>
